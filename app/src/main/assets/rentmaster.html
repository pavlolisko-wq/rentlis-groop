<!DOCTYPE html>
<html lang="ru" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Rentlis groop</title>
<style>
  :root{
    --bg:#0C0D10; --surface:#16171C; --surface-2:#1F2128; --surface-3:#2A2C34;
    --text:#F6F7F9; --muted:#8A8D98; --muted-2:#5E6068; --line:rgba(255,255,255,.06);
    --cream:#efe7dc; --cream-ink:#2a2018; --card-dark:rgba(42,32,25,.72);
    --page-bg:radial-gradient(700px 500px at 80% -6%,#241a12 0,transparent 56%),linear-gradient(180deg,#101013 0,#0b0b0e 100%);
    --nav-bg:rgba(22,23,28,.86);
    --gold:#FFC83D; --gold-2:#F5A623; --bronze:#d6b26e; --gold-soft:rgba(255,200,61,.14);
    --ink:#101114; --green:#4ADE80; --red:#F87171;
    --r-lg:28px; --r-md:22px; --r-sm:16px;
    --ease:cubic-bezier(.22,.61,.36,1);
    --font:"Segoe UI",Roboto,-apple-system,BlinkMacSystemFont,Arial,sans-serif;
    --serif:Georgia,"Times New Roman",serif;
  }
  :root[data-theme="light"]{
    --bg:#F1ECE3; --surface:#FFFFFF; --surface-2:#F7F2EA; --surface-3:#EBE4D8;
    --text:#1B1712; --muted:#8A8275; --muted-2:#B7AE9D; --line:rgba(0,0,0,.07);
    --cream:#FFFFFF; --cream-ink:#241c14; --card-dark:#FBF7EF;
    --page-bg:radial-gradient(700px 500px at 80% -6%,#FBE9C8 0,transparent 56%),linear-gradient(180deg,#F4ECDD 0,#EDE3D2 100%);
    --nav-bg:rgba(255,255,255,.82);
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;}
  body{font-family:var(--font);color:var(--text);display:flex;align-items:center;justify-content:center;min-height:100vh;padding:26px 14px;overflow-x:hidden;
    background:radial-gradient(1000px 700px at 18% -5%,#20160a 0,transparent 55%),radial-gradient(900px 600px at 110% 110%,#141821 0,transparent 50%),#060608;}

  .phone{position:relative;width:392px;height:824px;max-height:95vh;background:#000;border-radius:54px;padding:13px;box-shadow:0 0 0 2px #2a2c30,0 0 0 10px #0c0d10,0 40px 90px -20px rgba(0,0,0,.85);}
  .screen-wrap{position:relative;width:100%;height:100%;background:var(--bg);border-radius:42px;overflow:hidden;display:flex;flex-direction:column;transition:background .4s var(--ease);}
  .notch{position:absolute;top:10px;left:50%;transform:translateX(-50%);width:120px;height:28px;background:#000;border-radius:0 0 18px 18px;z-index:60;}
  .notch::after{content:"";position:absolute;top:9px;left:50%;transform:translateX(-50%);width:46px;height:5px;background:#1a1a1c;border-radius:4px;}
  .statusbar{position:relative;z-index:30;height:46px;flex:0 0 46px;display:flex;align-items:center;justify-content:space-between;padding:0 26px;font-size:13px;font-weight:600;color:var(--text);}
  .statusbar .icons{display:flex;gap:6px;align-items:center;}.statusbar .icons svg{width:16px;height:16px;}

  .pages{position:relative;flex:1;overflow:hidden;}
  .page{position:absolute;inset:0;overflow-y:auto;overflow-x:hidden;padding:4px 20px 112px;opacity:0;transform:translateY(16px) scale(.985);pointer-events:none;visibility:hidden;transition:opacity .4s var(--ease),transform .5s var(--ease);}
  .page::-webkit-scrollbar{display:none;}
  .page.active{opacity:1;transform:none;pointer-events:auto;visibility:visible;}
  .page.active .stagger{animation:rise .55s var(--ease) both;}
  .page.active .stagger:nth-child(1){animation-delay:.03s}.page.active .stagger:nth-child(2){animation-delay:.08s}
  .page.active .stagger:nth-child(3){animation-delay:.13s}.page.active .stagger:nth-child(4){animation-delay:.18s}
  .page.active .stagger:nth-child(5){animation-delay:.23s}.page.active .stagger:nth-child(6){animation-delay:.28s}
  .page.active .stagger:nth-child(7){animation-delay:.33s}.page.active .stagger:nth-child(8){animation-delay:.38s}
  @keyframes rise{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:none}}
  #home,#props,#fin,#prof{background:var(--page-bg);}

  .topbar{display:flex;align-items:center;justify-content:space-between;margin:8px 0 18px;}
  .wordmark{font-size:17px;font-weight:800;letter-spacing:.3px;color:var(--text);}
  .wordmark span{color:var(--gold);}
  .wordmark small{display:block;font-size:10px;font-weight:600;letter-spacing:1px;color:var(--muted);text-transform:uppercase;margin-top:3px;}
  .ic-btn{width:42px;height:42px;border-radius:14px;background:var(--surface);border:1px solid var(--line);display:flex;align-items:center;justify-content:center;color:var(--text);cursor:pointer;}
  .ic-btn svg{width:18px;height:18px;}

  /* elegant hero */
  .hero-el{position:relative;overflow:hidden;border-radius:30px;padding:26px 24px 22px;color:#f3ead8;background:radial-gradient(130% 90% at 82% -10%,#41301f 0%,#26190f 46%,#13100b 100%);border:1px solid rgba(214,178,110,.2);box-shadow:0 26px 54px -26px rgba(0,0,0,.85);}
  .hero-el::before{content:"";position:absolute;width:280px;height:280px;border-radius:50%;right:-90px;top:-130px;background:radial-gradient(closest-side,rgba(214,178,110,.28),transparent);}
  .hero-el::after{content:"";position:absolute;inset:0;background:linear-gradient(115deg,transparent 60%,rgba(255,255,255,.04));pointer-events:none;}
  .hero-el .eyebrow{font-size:11px;letter-spacing:3px;font-weight:700;color:var(--bronze);text-transform:uppercase;position:relative;z-index:2;}
  .hero-el .divider{width:46px;height:2px;background:linear-gradient(90deg,var(--bronze),transparent);margin:13px 0;position:relative;z-index:2;}
  .hero-el h1{font-family:var(--serif);font-size:46px;line-height:.92;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:#f7f0e2;margin-bottom:14px;position:relative;z-index:2;}
  .hero-el .caprow{font-size:10px;letter-spacing:2.5px;color:#b9a079;font-weight:600;text-transform:uppercase;margin-bottom:22px;position:relative;z-index:2;}
  .hero-el .pf{display:flex;justify-content:space-between;align-items:flex-end;position:relative;z-index:2;}
  .hero-el .pf .lbl{font-size:11px;color:#b9a079;font-weight:600;}
  .hero-el .pf .val{font-size:31px;font-weight:800;color:var(--gold);letter-spacing:-.6px;margin-top:5px;}
  .hero-el .cur-toggle{background:rgba(255,255,255,.06);}
  .hero-el .cur-toggle button{color:#b9a079;}
  .hero-el .cur-toggle button.on{background:var(--gold);color:#1a130a;}

  .cur-toggle{display:inline-flex;border-radius:30px;padding:3px;}
  .cur-toggle button{border:0;background:transparent;font-family:var(--font);font-size:12px;font-weight:700;padding:6px 12px;border-radius:30px;cursor:pointer;transition:.3s var(--ease);}

  .mgrid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:14px;}
  .mcard{background:var(--surface);border:1px solid var(--line);border-radius:20px;padding:15px;}
  .mcard .mi{width:36px;height:36px;border-radius:11px;background:var(--gold-soft);color:var(--gold);display:flex;align-items:center;justify-content:center;margin-bottom:10px;}
  .mcard .mi svg{width:18px;height:18px;}
  .mcard .mv{font-size:20px;font-weight:800;letter-spacing:-.4px;}
  .mcard .mk{font-size:11.5px;color:var(--muted);margin-top:2px;}

  .sec{display:flex;align-items:center;justify-content:space-between;margin:26px 2px 14px;}
  .sec h3{font-size:17px;font-weight:700;letter-spacing:-.3px;color:var(--text);}
  .sec a{font-size:13px;color:var(--gold);font-weight:600;cursor:pointer;}

  .head{display:flex;align-items:center;justify-content:space-between;margin:10px 0 20px;}
  .head .hi{font-size:14px;color:var(--muted);}
  .head .hi b{display:block;color:var(--text);font-size:22px;font-weight:700;margin-top:3px;letter-spacing:-.4px;}
  .avatar{width:46px;height:46px;border-radius:16px;background:linear-gradient(145deg,var(--gold),var(--gold-2));display:flex;align-items:center;justify-content:center;font-weight:800;font-size:15px;color:var(--ink);}

  .search{display:flex;align-items:center;gap:10px;background:var(--surface);border:1px solid var(--line);border-radius:var(--r-md);padding:13px 16px;margin-bottom:16px;}
  .search svg{width:18px;height:18px;color:var(--muted);}
  .search input{flex:1;background:transparent;border:0;outline:0;color:var(--text);font-family:var(--font);font-size:14px;}
  .search input::placeholder{color:var(--muted-2);}
  .chips{display:flex;gap:9px;overflow-x:auto;margin:0 -20px 16px;padding:0 20px 4px;}
  .chips::-webkit-scrollbar{display:none;}
  .chip{flex:0 0 auto;font-size:13px;font-weight:600;padding:9px 15px;border-radius:30px;background:var(--surface);border:1px solid var(--line);color:var(--muted);cursor:pointer;transition:.3s var(--ease);}
  .chip.on{background:linear-gradient(135deg,var(--gold),var(--gold-2));color:var(--ink);border-color:transparent;}

  .prop{display:flex;gap:14px;align-items:center;background:var(--surface);border:1px solid var(--line);border-radius:var(--r-md);padding:12px;margin-bottom:12px;transition:.3s var(--ease);cursor:pointer;position:relative;}
  .prop:active{transform:scale(.98);}
  .prop.hl{padding-left:17px;}
  .prop.hl::before{content:"";position:absolute;left:7px;top:14px;bottom:14px;width:4px;border-radius:4px;}
  .prop.hl.paid::before{background:var(--green);}
  .prop.hl.pending::before{background:var(--gold);}
  .prop.hl.overdue::before{background:var(--red);}
  .prop .ph{width:60px;height:60px;flex:0 0 60px;border-radius:16px;background:linear-gradient(135deg,var(--surface-3),var(--surface-2));display:flex;align-items:center;justify-content:center;background-size:cover;background-position:center;}
  .prop .ph svg{width:23px;height:23px;color:var(--muted);}
  .prop .info{flex:1;min-width:0;}
  .prop .info .t{font-size:15px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .prop .info .a{font-size:12.5px;color:var(--muted);margin-top:3px;display:flex;align-items:center;gap:4px;}
  .prop .info .a svg{width:13px;height:13px;flex:0 0 13px;}
  .prop .right{text-align:right;}
  .prop .right .rent{font-size:15px;font-weight:800;color:var(--gold);white-space:nowrap;}
  .badge{display:inline-block;font-size:10px;font-weight:700;padding:3px 8px;border-radius:20px;margin-top:6px;}
  .badge.ok{background:rgba(74,222,128,.14);color:var(--green);}
  .badge.no{background:rgba(248,113,113,.14);color:var(--red);}
  .badge.wait{background:rgba(255,200,61,.16);color:var(--gold);}
  .badge.build{background:rgba(255,200,61,.16);color:var(--gold);}

  .card{background:var(--surface);border:1px solid var(--line);border-radius:var(--r-lg);padding:20px;}
  .legend{display:flex;justify-content:space-between;align-items:flex-end;}
  .legend .v{font-size:30px;font-weight:800;letter-spacing:-.8px;}.legend .v small{font-size:14px;color:var(--muted);font-weight:600;}
  .legend .up{font-size:12px;font-weight:700;color:var(--green);background:rgba(74,222,128,.12);padding:5px 11px;border-radius:20px;}
  .bars{display:flex;align-items:flex-end;gap:6px;height:148px;margin-top:18px;}
  .bar{flex:1;display:flex;flex-direction:column;align-items:center;gap:7px;height:100%;justify-content:flex-end;cursor:pointer;}
  .bar .fill{width:100%;border-radius:7px 7px 3px 3px;background:var(--surface-3);height:0;transition:height .9s var(--ease);}
  .bar.on .fill{background:linear-gradient(180deg,var(--gold),var(--gold-2));}
  .bar .m{font-size:9.5px;color:var(--muted);font-weight:600;}.bar.on .m{color:var(--gold);}
  .row{display:flex;align-items:center;gap:14px;padding:13px 0;border-bottom:1px solid var(--line);}
  .row:last-child{border-bottom:0;}
  .row .ic{width:42px;height:42px;border-radius:13px;flex:0 0 42px;display:flex;align-items:center;justify-content:center;}.row .ic svg{width:19px;height:19px;}
  .row .nm{flex:1;}.row .nm b{font-size:14px;font-weight:700;display:block;}.row .nm span{font-size:12px;color:var(--muted);}
  .row .amt{font-weight:800;font-size:15px;}.amt.plus{color:var(--green);}.amt.minus{color:var(--red);}
  .inv3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;}
  .invb{background:var(--surface);border:1px solid var(--line);border-radius:var(--r-sm);padding:14px 10px;text-align:center;}
  .invb b{font-size:16px;font-weight:800;display:block;letter-spacing:-.3px;}
  .invb span{font-size:10.5px;color:var(--muted);}
  .invb .gr{font-size:10.5px;font-weight:700;color:var(--green);}

  .prof-head{display:flex;flex-direction:column;align-items:center;text-align:center;padding:14px 0 6px;}
  .prof-av{width:88px;height:88px;border-radius:28px;background:linear-gradient(145deg,var(--gold),var(--gold-2));display:flex;align-items:center;justify-content:center;font-size:32px;font-weight:800;color:var(--ink);}
  .prof-head .nm{font-size:21px;font-weight:800;margin-top:14px;}.prof-head .em{font-size:13px;color:var(--muted);margin-top:3px;}
  .prof-stats{display:grid;grid-template-columns:1fr 1fr 1fr;background:var(--surface);border:1px solid var(--line);border-radius:var(--r-md);padding:16px 0;margin:20px 0;}
  .prof-stats div{text-align:center;border-right:1px solid var(--line);}.prof-stats div:last-child{border-right:0;}
  .prof-stats b{font-size:18px;font-weight:800;display:block;}.prof-stats span{font-size:11px;color:var(--muted);}
  .menu{background:var(--surface);border:1px solid var(--line);border-radius:var(--r-md);overflow:hidden;}
  .menu-item{display:flex;align-items:center;gap:14px;padding:16px;border-bottom:1px solid var(--line);cursor:pointer;transition:.2s var(--ease);}
  .menu-item:last-child{border-bottom:0;}.menu-item:active{background:var(--surface-2);}
  .menu-item .mi{width:38px;height:38px;border-radius:12px;background:var(--gold-soft);color:var(--gold);display:flex;align-items:center;justify-content:center;flex:0 0 38px;}.menu-item .mi svg{width:18px;height:18px;}
  .menu-item .ml{flex:1;font-size:14.5px;font-weight:600;}.menu-item .ar{color:var(--muted-2);}.menu-item .ar svg{width:18px;height:18px;}

  /* bento cards reused in profile */
  .b-card{border-radius:24px;padding:17px;margin-bottom:13px;}
  .b-card .b-h{font-size:13px;font-weight:700;margin-bottom:13px;display:flex;align-items:center;gap:8px;}
  .b-card .b-h .grow{flex:1;}.b-card .b-h .edit{cursor:pointer;opacity:.55;width:30px;height:30px;border-radius:9px;display:flex;align-items:center;justify-content:center;margin:-6px -6px -6px 0;}
  .b-card .b-h svg{width:16px;height:16px;}
  .b-card.cream{background:var(--cream);color:var(--cream-ink);}.b-card.cream .b-h{color:#6b5840;}
  .b-card.dark{background:var(--card-dark);border:1px solid var(--line);color:var(--text);}
  .sch-item{background:rgba(0,0,0,.05);border-radius:15px;padding:11px 12px;margin-bottom:10px;}
  .b-card.dark .sch-item{background:rgba(255,255,255,.05);}.sch-item:last-child{margin-bottom:0;}
  .sch-item .tm{font-size:11px;font-weight:800;color:var(--gold-2);}
  .sch-item .ttl{font-size:13.5px;font-weight:700;margin-top:3px;}
  .sch-item .sub{font-size:11px;color:var(--muted);margin-top:2px;}
  .note{font-size:13px;font-weight:600;padding:10px 12px;border-radius:14px;background:rgba(255,255,255,.05);margin-bottom:9px;}
  :root[data-theme="light"] .note{background:rgba(0,0,0,.04);}.note:last-child{margin-bottom:0;}
  .note small{display:block;font-size:11px;font-weight:400;color:var(--muted);margin-top:3px;}
  .y-task{display:flex;align-items:center;gap:11px;padding:7px 0;cursor:pointer;}
  .y-box{width:21px;height:21px;border-radius:7px;border:2px solid #c5b39c;flex:0 0 21px;display:flex;align-items:center;justify-content:center;transition:.25s var(--ease);}
  .y-box svg{width:12px;height:12px;color:#fff;opacity:0;transform:scale(.4);transition:.25s var(--ease);}
  .y-task.done .y-box{background:var(--gold-2);border-color:var(--gold-2);}.y-task.done .y-box svg{opacity:1;transform:none;}
  .y-task .tx{font-size:13.5px;font-weight:600;flex:1;}.y-task.done .tx{text-decoration:line-through;color:var(--muted);}
  .addrow{font-size:12.5px;font-weight:700;color:var(--gold-2);cursor:pointer;padding:8px 0 2px;display:flex;align-items:center;gap:6px;}.addrow svg{width:14px;height:14px;}

  /* shareholders */
  .shrow{display:flex;align-items:center;gap:13px;background:var(--surface);border:1px solid var(--line);border-radius:18px;padding:14px;margin-bottom:11px;cursor:pointer;}
  .shrow .sa{width:44px;height:44px;border-radius:13px;background:var(--surface-3);display:flex;align-items:center;justify-content:center;font-weight:700;color:var(--gold);flex:0 0 44px;}
  .shrow .si{flex:1;min-width:0;}.shrow .si b{font-size:14px;display:block;}.shrow .si span{font-size:12px;color:var(--muted);}
  .shrow .si .share-bar{height:6px;border-radius:4px;background:var(--surface-3);margin-top:7px;overflow:hidden;}
  .shrow .si .share-bar i{display:block;height:100%;background:linear-gradient(90deg,var(--gold),var(--gold-2));}
  .shrow .sv{text-align:right;flex:0 0 auto;}.shrow .sv b{font-size:15px;color:var(--gold);}.shrow .sv span{font-size:11px;color:var(--muted);display:block;}

  /* detail */
  .detail{position:absolute;inset:0;z-index:40;background:var(--bg);transform:translateX(100%);transition:transform .45s var(--ease);display:flex;flex-direction:column;}
  .detail.open{transform:none;}
  .d-scroll{flex:1;overflow-y:auto;padding-bottom:30px;}.d-scroll::-webkit-scrollbar{display:none;}
  .d-hero{height:218px;position:relative;background:linear-gradient(135deg,#FFD75E,var(--gold-2));display:flex;align-items:flex-end;padding:20px;background-size:cover;background-position:center;}
  .d-hero.hasimg::after{content:"";position:absolute;inset:0;background:linear-gradient(180deg,transparent 30%,rgba(0,0,0,.6));}
  .d-hero .ov{position:relative;z-index:3;color:#fff;}.d-hero:not(.hasimg) .ov{color:var(--ink);}
  .d-icbtn{position:absolute;top:16px;width:42px;height:42px;border-radius:14px;background:rgba(16,17,20,.28);backdrop-filter:blur(6px);display:flex;align-items:center;justify-content:center;color:#fff;cursor:pointer;z-index:5;}.d-icbtn svg{width:20px;height:20px;}
  .d-back{left:16px;}.d-cam{right:16px;}
  .d-title .t{font-size:23px;font-weight:800;letter-spacing:-.5px;}
  .d-title .a{font-size:13px;font-weight:600;opacity:.85;margin-top:4px;display:flex;align-items:center;gap:5px;}.d-title .a svg{width:14px;height:14px;}
  .d-body{padding:18px 20px;}
  .d-kpis{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:16px;}
  .d-kpi{background:var(--surface);border:1px solid var(--line);border-radius:var(--r-sm);padding:13px 8px;text-align:center;cursor:pointer;}
  .d-kpi b{font-size:16px;font-weight:800;display:block;letter-spacing:-.3px;}.d-kpi span{font-size:10.5px;color:var(--muted);}
  h4.dh{font-size:15px;font-weight:700;margin:18px 2px 12px;display:flex;align-items:center;justify-content:space-between;}
  .complex-ph{height:120px;border-radius:var(--r-md);background:var(--surface-2);border:1px dashed var(--line);display:flex;align-items:center;justify-content:center;flex-direction:column;gap:6px;color:var(--muted);font-size:12px;font-weight:600;cursor:pointer;background-size:cover;background-position:center;overflow:hidden;}.complex-ph svg{width:24px;height:24px;}
  .tenant{display:flex;align-items:center;gap:13px;background:var(--surface);border:1px solid var(--line);border-radius:var(--r-md);padding:14px;cursor:pointer;}
  .tenant .ta{width:46px;height:46px;border-radius:14px;background:var(--surface-3);display:flex;align-items:center;justify-content:center;font-weight:700;color:var(--gold);}
  .tenant .ti{flex:1;}.tenant .ti b{font-size:14px;display:block;}.tenant .ti span{font-size:12px;color:var(--muted);}
  .tenant .call{width:42px;height:42px;border-radius:13px;background:var(--gold-soft);color:var(--gold);display:flex;align-items:center;justify-content:center;}.tenant .call svg{width:18px;height:18px;}
  .opt{display:flex;align-items:center;gap:12px;background:var(--surface);border:1px solid var(--line);border-radius:var(--r-sm);padding:13px 14px;margin-bottom:10px;}
  .opt .oi{width:34px;height:34px;border-radius:10px;background:var(--gold-soft);color:var(--gold);display:flex;align-items:center;justify-content:center;flex:0 0 34px;}.opt .oi svg{width:17px;height:17px;}
  .opt .ol{flex:1;cursor:pointer;}.opt .ol b{font-size:13.5px;font-weight:700;display:block;}.opt .ol span{font-size:11px;color:var(--muted);}

function money(eur){if(eur==null)return"—";var v=S.cur==="EUR"?eur:Math.round(eur*RATE);var s=Math.abs(Math.round(v)).toLocaleString("ru-RU").replace(/,/g," ");return (v<0?"-":"")+(S.cur==="EUR"?"€"+s:s+" L");}
function moneyShort(eur){var v=S.cur==="EUR"?eur:Math.round(eur*RATE);var sym=S.cur==="EUR"?"€":"",suf=S.cur==="EUR"?"":" L";if(Math.abs(v)>=1000)return sym+(v/1000).toFixed(Math.abs(v)>=100000?0:1).replace(".",",")+"K"+suf;return sym+Math.round(v)+suf;}
function initials(n){var p=(n||"").trim().split(" ");return ((p[0]?p[0][0]:"")+(p[1]?p[1][0]:"")).toUpperCase()||"+";}
function byId(id){for(var i=0;i<S.props.length;i++)if(S.props[i].id===id)return S.props[i];return null;}
function rentProps(){return S.props.filter(function(p){return p.type!=="construction";});}
function investProps(){return S.props.filter(function(p){return p.type==="construction";});}
function portfolioValue(){var s=0;S.props.forEach(function(p){s+=(p.market||0);});return s;}
function investedAmount(){var s=0;S.props.forEach(function(p){s+=(p.purchase||p.dealAmount||0);});return s;}
function monthIncome(){var s=0;rentProps().forEach(function(p){if(p.status==="ok")s+=(p.rent||0);});return s;}
function yearIncome(y){var s=0;S.props.forEach(function(p){if(p.pay&&p.pay[y]){for(var m in p.pay[y])s+=p.pay[y][m];}});return s;}
function totalCollected(){var s=0;S.props.forEach(function(p){if(p.pay){for(var y in p.pay)for(var m in p.pay[y])s+=p.pay[y][m];}});return s;}
function minYear(){var y=CUR_Y;S.props.forEach(function(p){var sy=syOf(p);if(sy<y)y=sy;});return y;}
function taxMonthly(p){if(!p.tax||!p.tax.on)return 0;if(p.tax.manual!=null)return p.tax.cur==="MDL"?p.tax.manual/RATE:p.tax.manual;return (p.rent||0)*(p.tax.pct||7)/100;}
function yearTax(y){var s=0;S.props.forEach(function(p){if(p.tax&&p.tax.on&&p.pay&&p.pay[y]){s+=taxMonthly(p)*Object.keys(p.pay[y]).length;}});return s;}
function objPayback(p){var base=p.purchase||p.dealAmount||0;if(!base)return 0;var col=0;if(p.pay){for(var y in p.pay)for(var m in p.pay[y])col+=p.pay[y][m];}return Math.round((col+((p.market||0)-base))/base*100);}
function payStatus(p){if(p.type==="construction")return"invest";if(p.status!=="ok")return"vacant";if(p.pay[CUR_Y]&&p.pay[CUR_Y][CUR_M])return"paid";return DEMO_DAY<=(p.payDay||5)?"pending":"overdue";}
function payStats(p){var paid=0,total=0,sum=0;if(!p.pay)return{paid:0,total:0,sum:0,rate:0};for(var y in p.pay){for(var m=1;m<=12;m++){if(y==CUR_Y&&m>CUR_M)continue;total++;if(p.pay[y][m]){paid++;sum+=p.pay[y][m];}}}return{paid:paid,total:total,sum:sum,rate:total?Math.round(paid/total*100):0};}

  +'<div class="seg" style="margin:0 0 14px;"><button data-ps="1" class="'+(cur?"on":"")+'">'+t("paid")+'</button><button data-ps="0" class="'+(cur?"":"on")+'">'+t("notPaid")+'</button></div>'
  +'<button class="sh-save" id="paySave">'+t("save")+'</button>');

 el("perSave").onclick=function(){x.date=el("perDate").value;x.amount=parseFloat(el("perAmt").value)||x.amount;x.paid=pd;closeSheet();renderDetail();};
}

 var d=el("tnDel");if(d)d.onclick=function(){p.tenant=null;p.status="no";closeSheet();renderDetail();renderHome();};

function editTax(p){
 openSheet(t("rentalTax"),
  '<div class="opt" style="margin-bottom:14px;"><div class="oi">'+svg(I.tax)+'</div><div class="ol"><b>'+t("rentalTax")+'</b><span>'+t("taxAuto")+'</span></div><div class="sw '+(p.tax.on?"on":"")+'" id="txSw"></div></div>'
  +fld(t("amount")+" ("+t("taxManual")+")","number","txAmt",p.tax.manual!=null?p.tax.manual:"")

  +'<div class="seg" id="txCur" style="margin-bottom:14px;"><button data-c="EUR" class="'+(p.tax.cur==="EUR"?"on":"")+'">EUR</button><button data-c="MDL" class="'+(p.tax.cur==="MDL"?"on":"")+'">MDL (леи)</button></div>'
  +'<button class="sh-save" id="txS">'+t("save")+'</button>');
 var on=p.tax.on,cur=p.tax.cur;

 el("txCur").querySelectorAll("button").forEach(function(b){b.onclick=function(){cur=this.getAttribute("data-c");el("txCur").querySelectorAll("button").forEach(function(z){z.classList.remove("on");});this.classList.add("on");};});
 el("txS").onclick=function(){p.tax.on=on;p.tax.cur=cur;var v=el("txAmt").value;p.tax.manual=v===""?null:(parseFloat(v)||null);closeSheet();renderDetail();renderFinance();};

function editLease(p){
 openSheet(t("leaseStart"),
  fld(t("leaseStart")+" (дд.мм.гггг)","text","lsDate",p.startDate)
  +fld(t("payDay")+" ("+t("ofMonth")+")","number","lsDay",p.payDay||5)
  +'<button class="sh-save" id="lsS">'+t("save")+'</button>');
 el("lsS").onclick=function(){var d=el("lsDate").value.trim();if(d)p.startDate=d;p.payDay=parseInt(el("lsDay").value)||p.payDay;
   var sy=syOf(p);for(var y=sy;y<=CUR_Y;y++){if(!p.pay[y])p.pay[y]={};}closeSheet();renderDetail();renderHome();};

function editObjNote(p){openSheet(t("addNote"),'<div class="fld"><label>'+t("note")+'</label><textarea id="onote">'+(p.note||"")+'</textarea></div><button class="sh-save" id="onS">'+t("save")+'</button>');el("onS").onclick=function(){p.note=el("onote").value;closeSheet();};}

function uploadImage(p,key){var inp=document.createElement("input");inp.type="file";inp.accept="image/*";inp.onchange=function(){var f=inp.files[0];if(!f)return;var r=new FileReader();r.onload=function(){p[key]=r.result;renderDetail();renderHome();if(document.querySelector(".page.active").id==="props")fillPropList(el("propSearch")?el("propSearch").value:"");};r.readAsDataURL(f);};inp.click();}
function uploadLogo(){var inp=document.createElement("input");inp.type="file";inp.accept="image/*";inp.onchange=function(){var f=inp.files[0];if(!f)return;var r=new FileReader();r.onload=function(){S.logo=r.result;renderAll();};r.readAsDataURL(f);};inp.click();}
function pastYearsBlock(p,sy){if(sy>=CUR_Y)return"";var out='<h4 class="dh">'+t("fillPastYears")+'</h4><div class="pastyears">';for(var y=sy;y<CUR_Y;y++){var done=p.pay[y]&&Object.keys(p.pay[y]).length>=12;out+='<div class="pyc'+(done?" done":"")+'" data-py="'+y+'">'+y+(done?" ✓":"")+'</div>';}return out+'</div>';}

/* ---------- sheets ---------- */
function openSheet(title,html){el("shTitle").textContent=title;el("shBody").innerHTML=html;el("scrim").classList.add("open");el("sheet").classList.add("open");}
function closeSheet(){el("scrim").classList.remove("open");el("sheet").classList.remove("open");}
el("shClose").onclick=closeSheet;el("scrim").onclick=closeSheet;
function fld(label,type,id,val){return '<div class="fld"><label>'+label+'</label><input type="'+type+'" id="'+id+'" value="'+(val==null?"":String(val).replace(/"/g,"&quot;"))+'"></div>';}

function editListSheet(kind){var arr=S[kind];
 var rows=arr.map(function(it,i){var main=kind==="tasks"?it.tx:(it.tm?it.tm+" · ":"")+it.ttl;var sub=kind==="tasks"?"":(it.sub||"");return '<div class="le"><div class="let"><b>'+main+'</b>'+(sub?'<span>'+sub+'</span>':'')+'</div><div class="del" data-del="'+i+'">'+svg(I.trash)+'</div></div>';}).join("");
 openSheet(t(kind),'<div class="listedit">'+rows+'</div><button class="sh-save" id="addNew">'+svg(I.plus,2.5)+' '+t("add")+'</button>');
 el("shBody").querySelectorAll("[data-del]").forEach(function(b){b.onclick=function(){arr.splice(+this.getAttribute("data-del"),1);renderProfile();editListSheet(kind);};});
 el("addNew").onclick=function(){closeSheet();addListItemSheet(kind);};
}
function addListItemSheet(kind){var html;
 if(kind==="schedule")html=fld(t("time"),"text","f1","")+fld(t("heading"),"text","f2","")+fld(t("address"),"text","f3","");
 else if(kind==="notes")html=fld(t("heading"),"text","f2","")+fld(t("note"),"text","f3","");
 else html='<div class="fld"><label>'+t("task")+'</label><input id="f2" type="text"></div>';
 openSheet(t("add"),html+'<button class="sh-save" id="liS">'+t("save")+'</button>');
 el("liS").onclick=function(){if(kind==="schedule")S.schedule.push({tm:el("f1").value,ttl:el("f2").value,sub:el("f3").value});else if(kind==="notes")S.notes.push({ttl:el("f2").value,sub:el("f3").value});else S.tasks.push({tx:el("f2").value,done:false});closeSheet();renderProfile();};
}

function editShareholder(i){var x=i>=0?S.shareholders[i]:{name:"",share:0,divPct:50,divAmt:0,cur:"EUR"};
 openSheet(i>=0?t("shareholders"):t("addShareholder"),
  fld(t("fullName"),"text","shN",x.name)
  +'<div class="fld2">'+inl(t("share")+" %","number","shSh",x.share)+inl(t("dividendPct"),"number","shDp",x.divPct)+'</div>'
  +fld(t("dividends")+" ("+t("amount")+", "+t("mo")+")","number","shDa",x.divAmt)
  +'<label style="font-size:12px;font-weight:700;color:var(--muted);display:block;margin:-6px 0 7px;">'+'€ / MDL'+'</label>'
  +'<div class="seg" id="shCur" style="margin-bottom:14px;"><button data-c="EUR" class="'+(x.cur==="EUR"?"on":"")+'">EUR</button><button data-c="MDL" class="'+(x.cur==="MDL"?"on":"")+'">MDL (леи)</button></div>'
  +'<button class="sh-save" id="shS">'+t("save")+'</button>'+(i>=0?'<button class="sh-del" id="shDel">'+t("delete")+'</button>':''));
 var cur=x.cur;el("shCur").querySelectorAll("button").forEach(function(b){b.onclick=function(){cur=this.getAttribute("data-c");el("shCur").querySelectorAll("button").forEach(function(z){z.classList.remove("on");});this.classList.add("on");};});
 el("shS").onclick=function(){var o={name:el("shN").value.trim()||"—",share:parseFloat(el("shSh").value)||0,divPct:parseFloat(el("shDp").value)||0,divAmt:parseFloat(el("shDa").value)||0,cur:cur};if(i>=0)S.shareholders[i]=o;else S.shareholders.push(o);closeSheet();renderProfile();};
 var d=el("shDel");if(d)d.onclick=function(){S.shareholders.splice(i,1);closeSheet();renderProfile();};
}

/* add object */
var newType="flat";
function addObjectSheet(){newType="flat";openSheet(t("addObject"),objForm());wireObjForm();}
function objForm(){
 var types=[["flat",t("apartments"),I.home],["parking",t("parking"),I.car],["construction",t("construction"),I.crane]];
 var sel='<label style="font-size:12px;font-weight:700;color:var(--muted);display:block;margin-bottom:7px;">'+t("type")+'</label><div class="typesel">'+types.map(function(x){return '<div class="ty '+(newType===x[0]?"on":"")+'" data-ty="'+x[0]+'">'+svg(x[2])+'<span>'+x[1]+'</span></div>';}).join("")+'</div>';
 var common=fld(t("title"),"text","o_title","")+'<div class="fld2">'+inl(t("district"),"text","o_district")+inl(t("address"),"text","o_addr")+'</div>';
 var extra;
 if(newType==="construction")extra='<div class="fld2">'+inl(t("dealAmount"),"number","o_deal")+inl(t("monthly"),"number","o_monthly")+'</div><div class="fld2">'+inl(t("firstInst")+" (дд.мм.гггг)","text","o_first")+inl(t("marketPrice"),"number","o_market")+'</div>';
 else extra='<div class="fld2">'+inl("м²","number","o_area")+inl(t("rentMo"),"number","o_rent")+'</div><div class="fld2">'+inl(t("purchasePrice"),"number","o_purchase")+inl(t("marketPrice"),"number","o_market")+'</div><div class="fld2">'+inl(t("leaseStart")+" (дд.мм.гггг)","text","o_start")+inl(t("payDay"),"number","o_day")+'</div><div class="fld2">'+inl(t("fullName"),"text","o_tn")+inl(t("citizenship"),"text","o_tc")+'</div>';
 return sel+common+extra+'<button class="sh-save" id="objSave">'+t("save")+'</button>';
}
function inl(label,type,id){return '<div class="fld"><label>'+label+'</label><input type="'+type+'" id="'+id+'"></div>';}
function wireObjForm(){
 el("shBody").querySelectorAll("[data-ty]").forEach(function(x){x.onclick=function(){newType=this.getAttribute("data-ty");el("shBody").innerHTML=objForm();wireObjForm();};});
 el("objSave").onclick=function(){var id=Math.max.apply(null,S.props.map(function(p){return p.id;}))+1;
  var title=el("o_title").value||(newType==="parking"?t("parking"):newType==="construction"?t("construction"):t("apartments"));
  var district=el("o_district").value||"Chișinău";var addr=el("o_addr").value||district;
  if(newType==="construction"){var deal=parseFloat(el("o_deal").value)||40000,mon=parseFloat(el("o_monthly").value)||400,first=el("o_first").value||"01.01.2025";S.props.push({id:id,type:"construction",title:title,district:district,addr:addr,area:50,purchase:deal,market:parseFloat(el("o_market").value)||deal,status:"build",dealAmount:deal,monthly:mon,firstInst:first,periods:buildPeriods(first,mon,Math.max(1,Math.round(deal/mon)),0),wall:null,complex:null});}
  else{var rent=parseFloat(el("o_rent").value)||0,start=el("o_start").value||("01.01."+CUR_Y),tn=el("o_tn").value.trim();S.props.push(mkRent({id:id,type:newType,title:title,district:district,addr:addr,area:parseFloat(el("o_area").value)||40,rent:rent,purchase:parseFloat(el("o_purchase").value)||0,market:parseFloat(el("o_market").value)||0,status:tn?"ok":"no",tn:tn,tc:el("o_tc").value.trim(),utils:false,repair:false,start:start,payDay:parseInt(el("o_day").value)||5}));}
  closeSheet();renderAll();go("props");openDetail(id);
 };
}

/* settings */
function settingsSheet(){var langs=[["ro","Română"],["en","English"],["ru","Русский"]];
 openSheet(t("settings"),
  '<div class="opt"><div class="oi">'+svg(I.globe)+'</div><div class="ol"><b>'+t("language")+'</b></div><div class="seg" id="langSeg">'+langs.map(function(l){return '<button data-l="'+l[0]+'" class="'+(S.lang===l[0]?"on":"")+'">'+l[1].slice(0,3)+'</button>';}).join("")+'</div></div>'
  +'<div class="opt"><div class="oi">'+svg(I.sun)+'</div><div class="ol"><b>'+t("theme")+'</b></div><div class="seg" id="thSeg"><button data-th="light" class="'+(S.theme==="light"?"on":"")+'">'+t("light")+'</button><button data-th="dark" class="'+(S.theme==="dark"?"on":"")+'">'+t("dark")+'</button></div></div>');
 el("langSeg").querySelectorAll("button").forEach(function(b){b.onclick=function(){S.lang=this.getAttribute("data-l");document.documentElement.lang=S.lang;renderAll();settingsSheet();};});
 el("thSeg").querySelectorAll("button").forEach(function(b){b.onclick=function(){S.theme=this.getAttribute("data-th");document.documentElement.setAttribute("data-theme",S.theme);settingsSheet();};});

/* invoice */
function invoiceSheet(pid){var p=pid?byId(pid):rentProps().filter(function(x){return x.status==="ok";})[0];
 if(!p){openSheet(t("invoice"),'<div style="text-align:center;color:var(--muted);padding:30px;">—</div>');return;}
 var gross=p.rent,tax=Math.round(taxMonthly(p)||gross*0.07);var mn=["янв","фев","мар","апр","май","июн","июл","авг","сен","окт","ноя","дек"];var per=mn[CUR_M-1]+" "+CUR_Y;
 var html='<div class="invoice" id="invDoc"><h2>'+t("invoiceTitle")+' · №'+String(p.id).padStart(4,"0")+'/'+CUR_Y+'</h2><div class="muted">Rentlis groop · Chișinău, MD · 27.06.'+CUR_Y+'</div><div style="height:14px"></div>'
  +'<div class="inv-row"><span>'+t("invObject")+'</span><b>'+p.title+'</b></div>'
  +'<div class="inv-row"><span>'+t("address")+'</span><span>str. '+p.addr+'</span></div>'
  +'<div class="inv-row"><span>'+t("invTenant")+'</span><span>'+(p.tenant?p.tenant.name:"—")+'</span></div>'
  +'<div class="inv-row"><span>'+t("citizenship")+'</span><span>'+(p.tenant?p.tenant.citizenship:"—")+'</span></div>'
  +'<div class="inv-row"><span>'+t("invPeriod")+'</span><span>'+per+'</span></div>'
  +'<div class="inv-row"><span>'+t("rentMo")+'</span><span>'+money(gross)+'</span></div>'
  +'<div class="inv-row"><span>'+t("invTax")+'</span><span>'+money(tax)+'</span></div>'
  +'<div class="inv-row"><span class="tot">'+t("invAmount")+'</span><span class="tot">'+money(gross)+'</span></div>'
  +'<div class="stamp">'+t("invPaid")+'</div></div>'
  +'<button class="sh-save" id="invPrint" style="margin-top:16px;">'+svg(I.doc)+' '+t("print")+'</button>';
 openSheet(t("invoice"),html);el("invPrint").onclick=function(){printInvoice(el("invDoc").outerHTML);};
}
function printInvoice(inner){var w=window.open("","_blank");if(!w){alert("Разрешите всплывающие окна для печати/PDF");return;}
 w.document.write('<html><head><title>Invoice</title><style>body{font-family:Arial,sans-serif;padding:30px;color:#1a1a1a}h2{font-size:22px}.muted{color:#777;font-size:13px}.inv-row{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid #eee}.tot{font-size:19px;font-weight:800}.stamp{margin-top:16px;padding:8px 14px;border:2px solid #F5A623;color:#F5A623;border-radius:10px;display:inline-block;font-weight:800;transform:rotate(-4deg)}</style></head><body>'+inner+'</body></html>');w.document.close();setTimeout(function(){w.print();},300);}

/* ---------- nav / render ---------- */
function go(id){var c=document.querySelector(".page.active"),n=el(id);if(c===n)return;if(c)c.classList.remove("active");n.classList.add("active");n.scrollTop=0;document.querySelectorAll("#nav button[data-go]").forEach(function(b){b.classList.toggle("on",b.getAttribute("data-go")===id);});if(id==="fin")setTimeout(function(){el("fin").querySelectorAll("#bars .fill").forEach(function(f){f.style.height=f.getAttribute("data-h")+"%";});},150);}
function renderAll(){renderHome();renderProps();renderFinance();renderProfile();renderNav();if(el("detail").classList.contains("open"))renderDetail();}
document.documentElement.setAttribute("data-theme",S.theme);
renderAll();
})();
</script>
